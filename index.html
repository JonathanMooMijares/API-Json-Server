<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
    <header>
        <div class="container mt-5">
            <div class="container">
                <div class="row justify-content-center align-items-center text-center g-5">
                    <div class="col-3">
                        <div class="d-grid gap-2">
                            <button type="button" name="" id="Select" class="p-3 btn btn-primary">
                                <p class="h5">Mostrar Informacion</p>
                            </button>
                        </div>

                    </div>
                    <div class="col-3">
                        <div class="d-grid gap-2">
                            <button type="button" name="" id="Insert" class="p-3 btn btn-primary" data-bs-toggle="modal"
                                data-bs-target="#modalId"><p class="h5">Agregar Tarea</p></button>
                                <!-- Modal Body -->
                                <!-- if you want to close by clicking outside the modal, delete the last endpoint:data-bs-backdrop and data-bs-keyboard -->
                                <div class="modal fade" id="modalId" tabindex="-1" data-bs-backdrop="static"
                                    data-bs-keyboard="false" role="dialog" aria-labelledby="modalTitleId"
                                    aria-hidden="true">
                                    <div class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal-sm"
                                        role="document">
                                        <div class="modal-content">
                                            <div class="modal-header">
                                                <h5 class="modal-title" id="modalTitleId">
                                                    Modal title
                                                </h5>
                                                <button type="button" class="btn-close" data-bs-dismiss="modal"
                                                    aria-label="Close"></button>
                                            </div>
                                            <div class="modal-body">Body</div>
                                            <div class="modal-footer">
                                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                                    Close
                                                </button>
                                                <button type="button" class="btn btn-primary">Save</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                            </button>
                        </div>

                    </div>
                    <div class="col-3">
                        <div class="d-grid gap-2">
                            <button type="button" name="" id="" class="p-3 btn btn-primary">
                                <p class="h5">Eliminar Información</p>
                            </button>
                        </div>

                    </div>
                    <div class="col-3">
                        <div class="d-grid gap-2">
                            <button type="button" name="" id="" class="p-3 btn btn-primary">
                                <p class="h5">Actualizar Información</p>
                            </button> <!-- Modal trigger button -->

                        </div>

                    </div>
                </div>
            </div>
        </div>
    </header>
    <main id="Contenido" class="m-5">
        <!-- Modal trigger button -->


        <!-- Optional: Place to the bottom of scripts -->
        <script>
            
        </script>

    </main>

    <script src="src/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>

</body>

</html>
